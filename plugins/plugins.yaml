# Plugin registry for Auxilium Manus.
#
# The backend should read this file once during application startup and expose
# the resulting static registry through an API endpoint for the frontend.
schema_version: 1

plugins:
  - id: device-selection
    name: Device Selection
    description: Select one or more target devices from the inventory.
    artifact_type: inventory_selector
    filename: device_selection.py
    enabled: true
    metadata:
      mandatory_input:
        - name: inventory_source
          description: Inventory provider used to resolve target devices.
          data_type: string
          required: true
          example: nautobot
        - name: device_filter
          description: Filter expression that selects devices for this workflow.
          data_type: object
          required: true
          example:
            site: dc1
            role: leaf
      supported_output:
        - name: selected_devices
          description: Devices selected for downstream workflow steps.
          data_type: device_list
        - name: selection_metadata
          description: Metadata about the inventory query and selected count.
          data_type: object

  - id: ssh-login
    name: SSH Login
    description: Open a managed SSH session against each selected device.
    artifact_type: connection
    filename: ssh_login.py
    enabled: true
    metadata:
      mandatory_input:
        - name: selected_devices
          description: Device list produced by a previous selection step.
          data_type: device_list
          required: true
        - name: credential_reference
          description: Reference to credentials stored in the backend.
          data_type: credential_ref
          required: true
      supported_output:
        - name: connection_handles
          description: Runtime connection references for subsequent command steps.
          data_type: connection_list
        - name: connection_status
          description: Per-device connection status and timestamps.
          data_type: object

  - id: run-command
    name: Run Command
    description: Execute one or more CLI commands on connected devices.
    artifact_type: command_execution
    filename: run_command.py
    enabled: true
    metadata:
      mandatory_input:
        - name: selected_devices
          description: Target devices for command execution.
          data_type: device_list
          required: true
        - name: commands
          description: CLI commands to execute in order.
          data_type: string_list
          required: true
          example:
            - show version
            - show running-config
      supported_output:
        - name: command_results
          description: Structured command results split by device and command.
          data_type: command_result_list
        - name: raw_output
          description: Raw CLI output grouped by device.
          data_type: text_map

  - id: condition
    name: Condition
    description: Branch workflow execution based on metadata or content values.
    artifact_type: control_flow
    filename: condition.py
    enabled: true
    metadata:
      mandatory_input:
        - name: expression
          description: Boolean expression evaluated against previous step output.
          data_type: expression
          required: true
          example: command_results[*].exit_code == 0
        - name: input_reference
          description: Reference to data emitted by an earlier workflow step.
          data_type: output_ref
          required: true
      supported_output:
        - name: branch_result
          description: Boolean result used to choose the next workflow path.
          data_type: boolean
        - name: evaluation_metadata
          description: Expression evaluation details for audit and debugging.
          data_type: object

  - id: store-artifact
    name: Store Artifact
    description: Persist generated content such as backups, reports, or logs.
    artifact_type: persistent_artifact
    filename: store_artifact.py
    enabled: true
    metadata:
      mandatory_input:
        - name: content_reference
          description: Reference to content generated by an earlier step.
          data_type: output_ref
          required: true
        - name: retention_policy
          description: Retention policy that controls artifact lifecycle.
          data_type: string
          required: true
          example: standard-90-days
      supported_output:
        - name: artifact_id
          description: Durable artifact identifier.
          data_type: string
        - name: artifact_metadata
          description: Stored artifact metadata including size, timestamps, and hash.
          data_type: object
