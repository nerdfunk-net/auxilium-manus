[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "migrations/*", "scripts/*", ".venv/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
