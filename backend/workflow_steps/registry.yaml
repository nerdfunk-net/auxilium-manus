# Plugin registry for Auxilium Manus.
#
# Capability fields (requires, produces, consumes, outcomes) drive canvas validation
# and runtime guards. metadata.configuration_input drives step config forms.
schema_version: 1

plugins:
  - id: get-nautobot-devices
    name: Get from Nautobot
    overview: Select devices from the Nautobot inventory.
    description: Select one or more target devices from the inventory.
    artifact_type: inventory_selector
    palette_category: nautobot
    directory: get_nautobot_devices
    enabled: true
    requires: []
    produces: [identity]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: nautobot_source_id
          description: ID of a Nautobot source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-lab
        - name: inventory_id
          description: ID of the saved inventory selected in the workflow builder.
          data_type: integer
          required: false
          example: 42
        - name: inventory_name
          description: Display name of the selected saved inventory.
          data_type: string
          required: false
          example: Core routers
        - name: device_filter
          description: >
            Filter tree snapshot derived from the selected inventory at configuration time.
            Used at runtime to resolve devices from Nautobot.
          data_type: object
          required: true
        - name: fan_out
          description: >
            Fan-out configuration. When enabled, each device (or chunk) is processed
            as an independent Hatchet child workflow instead of all devices sharing
            one workflow run.
          data_type: object
          required: false
          example:
            enabled: true
            mode: per_device
            chunk_size: 1
            max_concurrency: 0

  - id: get-ise-devices
    name: Get from ISE
    overview: Select devices from Cisco ISE.
    description: >
      Look up network devices in Cisco ISE by name, IP/CIDR, or network device group.
    artifact_type: inventory_selector
    palette_category: cisco
    directory: get_ise_devices
    enabled: true
    requires: []
    produces: [identity]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: ise_source_id
          description: ID of a Cisco ISE source configured under Settings → Sources.
          data_type: string
          required: true
          example: lab-ise
        - name: query_mode
          description: >
            How to look up devices in ISE — "name", "cidr", or "group".
          data_type: string
          required: true
          example: name
        - name: device_names
          description: Device names to look up. Used when query_mode is "name".
          data_type: array
          required: false
        - name: cidr
          description: >
            IP address or CIDR prefix to match against ISE device IPs.
            Used when query_mode is "cidr".
          data_type: string
          required: false
          example: 10.10.10.0/24
        - name: group_name
          description: >
            Full hierarchical ISE network device group (NDG) name.
            Used when query_mode is "group".
          data_type: string
          required: false
          example: "Location#All Locations#Building1"
        - name: resolve_to_devices
          description: >
            When enabled, entries with a netmask other than /32 (possible
            groups or subnets) are expanded into individual devices by
            querying Nautobot's Primary Prefix filter (within_include) for
            the CIDR derived from the entry's IP/mask. Requires
            nautobot_source_id. If no matching Nautobot devices are found,
            the raw ISE entry is kept unchanged.
          data_type: boolean
          required: false
          example: false
        - name: nautobot_source_id
          description: >
            ID of a Nautobot source configured under Settings → Sources.
            Required when resolve_to_devices is enabled.
          data_type: string
          required: false
          example: prod-lab
        - name: fan_out
          description: >
            Fan-out configuration. When enabled, each device (or chunk) is processed
            as an independent Hatchet child workflow instead of all devices sharing
            one workflow run.
          data_type: object
          required: false
          example:
            enabled: true
            mode: per_device
            chunk_size: 1
            max_concurrency: 0

  - id: get-ise-tacacs-key
    name: Get TACACS+ Key from ISE
    overview: Look up a device's TACACS+ shared secret in Cisco ISE.
    description: >
      Resolve each device's TACACS+ key from Cisco ISE using a configurable priority
      of name, location-group, and IP-based lookups.
    artifact_type: configuration_retrieval
    palette_category: cisco
    directory: get_ise_tacacs_key
    enabled: true
    requires: [identity]
    produces: [attributes]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: ise_source_id
          description: >
            ID of a Cisco ISE source configured under Settings → Sources. If ISE
            cannot be reached or authentication fails, the step routes to the
            failure outcome instead of raising (a per-device "key not found" still
            routes to success — see the failure outcome description).
          data_type: string
          required: true
          example: lab-ise
        - name: priority
          description: >
            Ordered list of lookup strategies, each individually enabled/disabled,
            tried in order until one finds a key: name_exact_32 (device name, ISE
            entry netmask must be /32), name_any (device name, any netmask),
            location_group (Nautobot device location as an ISE Location network
            device group), ip_prefix_scan (device's primary IPv4, narrowing from
            /32 down to /8 via ISE's exact-match filter — cheap, but only finds
            entries stored as a clean CIDR network address), ip_range_scan
            (full-inventory fallback for ISE entries stored as a range, e.g.
            "192.168.178.1-254", or a wildcard, e.g. "192.168.178.*" — these
            can't be found via ISE's server-side filter at all).
          data_type: object
          required: true
          example:
            - type: name_exact_32
              enabled: true
            - type: name_any
              enabled: true
            - type: location_group
              enabled: true
            - type: ip_prefix_scan
              enabled: true
            - type: ip_range_scan
              enabled: true
        - name: location_group_prefix
          description: >
            Prefix used to build the ISE Location group name for the
            location_group tier, as Location#{prefix}#{nautobot location name}.
          data_type: string
          required: false
          example: All Locations

  - id: update-ise-tacacs-key
    name: Update TACACS+ Key in ISE
    overview: Set a device's TACACS+ shared secret in Cisco ISE.
    description: >
      Update each device's TACACS+ shared secret in Cisco ISE. The new key can be a
      fixed value or resolved per device from a {path.to.value} attribute expression.
    artifact_type: command_execution
    palette_category: cisco
    directory: update_ise_tacacs_key
    enabled: true
    requires: [identity]
    produces: [attributes]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: ise_source_id
          description: >
            ID of a Cisco ISE source configured under Settings → Sources. If ISE
            cannot be reached or authentication fails, the step routes to the
            failure outcome instead of raising (a per-device lookup/update miss
            still routes to success — see the failure outcome description).
          data_type: string
          required: true
          example: lab-ise
        - name: new_key
          description: >
            The TACACS+ shared secret to set on every device. Use a fixed value, or
            wrap a dot path in braces to resolve it per device from the device's
            attribute bags, e.g. {custom.new_tacacs_key} or
            {nautobot.custom_fields.tacacs_key}, optionally with a fallback:
            {custom.new_tacacs_key | default('fallback-value')}. A device whose
            expression resolves to nothing, or whose device can't be located or
            updated in ISE, is marked failed but does not stop the step.
          data_type: string
          required: true
          example: "{custom.new_tacacs_key}"

  - id: add-to-ise
    name: Add to ISE
    overview: Create a new network device in Cisco ISE.
    description: >
      Register each device as a new network device in Cisco ISE, with an IP address,
      optional device group memberships, and a TACACS+ shared secret.
    artifact_type: command_execution
    palette_category: cisco
    directory: add_to_ise
    enabled: true
    requires: [identity]
    produces: [attributes]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: ise_source_id
          description: >
            ID of a Cisco ISE source configured under Settings → Sources. If ISE
            cannot be reached or authentication fails, the step routes to the
            failure outcome instead of raising (a per-device create failure still
            routes to success — see the failure outcome description).
          data_type: string
          required: true
          example: lab-ise
        - name: device_name
          description: >
            The device name to register in ISE. Use a fixed value, or wrap a dot path
            in braces to resolve it per device from the device's attribute bags, e.g.
            {name} or {nautobot.custom_fields.device_name}, optionally with a
            fallback: {name | default('fallback-name')}. A device whose expression
            resolves to nothing is marked failed but does not stop the step.
          data_type: string
          required: true
          example: "{name}"
        - name: description
          description: Fixed description text set on the created ISE device. Optional.
          data_type: string
          required: false
        - name: ip_address
          description: >
            The device's IP address to register in ISE. Use a fixed value, or a
            {path.to.value} expression with the same convention as device_name, e.g.
            {primary_ip4}. Nautobot's primary_ip4 is commonly stored with a netmask
            suffix (e.g. 10.0.0.1/24) — any /nn suffix is stripped automatically and
            the device is registered as a single host (mask 32); there is no separate
            netmask field. If {primary_ip4} doesn't resolve (the device's own
            primary_ip4 field is only set by inventory steps that fetch full device
            records, e.g. Get from Nautobot), it automatically falls back to the
            nautobot.primary_ip4.address attribute bag path, which is where the IP
            lives for devices sourced via Get from List/Get from ISE and enriched by
            Get Nautobot Attributes.
          data_type: string
          required: true
          example: "{primary_ip4}"
        - name: new_key
          description: >
            The TACACS+ shared secret to set on the created device. Use a fixed value,
            or a {path.to.value} expression with the same convention as device_name.
          data_type: string
          required: true
          example: "{custom.new_tacacs_key}"
        - name: device_groups
          description: >
            Full hierarchical ISE network device group (NDG) names the new device
            should belong to, e.g. "Location#All Locations" or
            "Device Type#All Device Types". Leave empty for no group memberships.
          data_type: array
          required: false
          example:
            - "Location#All Locations"
            - "Device Type#All Device Types"

  - id: get-from-list
    name: Get from List
    overview: Configure a static list of devices.
    description: Enter one or more device names to use as workflow targets.
    artifact_type: inventory_selector
    directory: get_from_list
    enabled: true
    requires: []
    produces: [identity]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: devices
          description: Device names (hostnames) to include in the workflow.
          data_type: string_list
          required: true
          example:
            - router1.example.com
            - switch2.example.com
        - name: fan_out
          description: >
            Fan-out configuration. When enabled, each device (or chunk) is processed
            as an independent Hatchet child workflow instead of all devices sharing
            one workflow run.
          data_type: object
          required: false
          example:
            enabled: true
            mode: per_device
            chunk_size: 1
            max_concurrency: 0

  - id: get-git-devices
    name: Get from Git
    overview: Select devices from Git inventory files.
    description: Select one or more target devices from the inventory.
    artifact_type: inventory_selector
    directory: get_git_devices
    enabled: true
    requires: []
    produces: [identity]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: git_source_id
          description: ID of a Git source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-lab
        - name: filename_pattern
          description: Pattern to identify relevant files in the Git repository.
          data_type: string
          required: true
          example: 'configs/*.yaml'
        - name: device_mapping
          description: Mapping that extracts device identifiers from file contents.
          data_type: object
          required: false
          example:
            device_id_field: hostname
        - name: fan_out
          description: >
            Fan-out configuration. When enabled, each device (or chunk) is processed
            as an independent Hatchet child workflow instead of all devices sharing
            one workflow run.
          data_type: object
          required: false
          example:
            enabled: true
            mode: per_device
            chunk_size: 1
            max_concurrency: 0

  - id: get-nautobot-attributes
    name: Get Nautobot Attributes
    overview: Retrieve Nautobot attributes for selected devices.
    description: Retrieve attributes from Nautobot for selected devices.
    artifact_type: inventory_selector
    palette_category: nautobot
    directory: get_nautobot_attributes
    enabled: true
    requires: [identity]
    produces: [attributes]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: nautobot_source_id
          description: ID of a Nautobot source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-lab
        - name: list_of_attributes
          description: List of Nautobot attributes to retrieve for each device.
          data_type: string_list
          required: true
          example:
            - location
            - role

  - id: update-nautobot-device
    name: Update Device
    overview: Update Nautobot device fields, interfaces, and tags.
    description: Update device attributes, interfaces, tags, and custom fields in Nautobot.
    artifact_type: command_execution
    palette_category: nautobot
    directory: update_nautobot_device
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: nautobot_source_id
          description: ID of a Nautobot source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-lab
        - name: device_identifier
          description: >
            How to identify the device. Use from_context for workflow devices, or
            explicit with id or name when running standalone.
          data_type: object
          required: false
          example:
            mode: from_context
        - name: update_fields
          description: >
            Device fields to update. Only non-empty values are sent to Nautobot.
          data_type: object
          required: false
          example:
            status: active
            location: dc1
        - name: interfaces
          description: Interfaces to create or update, including IP address and description.
          data_type: object_list
          required: false
          example:
            - name: GigabitEthernet0/0
              description: Uplink
              ip_address: 10.0.0.1/24
              namespace: Global
        - name: add_prefix
          description: Automatically create missing IP prefixes when assigning addresses.
          data_type: boolean
          required: false
          default: true
        - name: default_prefix_length
          description: Default prefix length when creating prefixes.
          data_type: string
          required: false
          default: /24
        - name: sync_interfaces
          description: Delete device interfaces not listed in the interfaces configuration.
          data_type: boolean
          required: false
          default: false

  - id: get-device-configs
    name: Get Configs
    overview: Get device configuration in the chosen format.
    description: Get device configuration in the specified format.
    artifact_type: configuration_retrieval
    directory: get_device_configs
    enabled: true
    requires: [identity]
    produces: [running_config, startup_config]
    primary_output: running_config
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: credential_reference
          description: Reference to credentials stored in the backend.
          data_type: credential_ref
          required: true
        - name: config_format
          description: Format of the configuration to retrieve.
          data_type: string
          required: false
          default: both
          example: both

  - id: run-command
    name: Run Command
    overview: Execute CLI commands on connected devices.
    description: Execute one or more CLI commands on connected devices.
    artifact_type: command_execution
    directory: run_command
    enabled: true
    requires: [identity]
    produces: []
    primary_output: command_output
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: credential_reference
          description: Reference to credentials stored in the backend.
          data_type: credential_ref
          required: true
        - name: commands
          description: CLI commands to execute in order.
          data_type: string_list
          required: true
          example:
            - show version
            - show running-config
        - name: use_textfsm
          description: Parse command output with TextFSM templates when available.
          data_type: boolean
          required: false
          default: false
        - name: network_driver_override
          description: Override the Netmiko device type for all devices in this step.
          data_type: string
          required: false
          example: cisco_ios

  - id: route-on-attribute
    name: Route on Attribute
    overview: Branch workflow paths by attribute value.
    description: Split devices onto different paths by matching an attribute value.
    artifact_type: control_flow
    directory: route_on_attribute
    enabled: true
    requires: [identity]
    produces: [identity]
    outcomes:
      - name: ios
      - name: nxos
      - name: unmatched
    metadata:
      configuration_input:
        - name: attribute_path
          description: >
            Dot path to the attribute to match. Use device.* for core fields
            (device.network_driver) or bag paths for enriched attributes
            (nautobot.role.name, git.filename, custom.field).
          data_type: string
          required: true
          example: device.network_driver
        - name: routes
          description: >
            Ordered route rules. The first matching route wins. Each route maps
            attribute values to an outcome handle name.
          data_type: object_list
          required: true
          example:
            - outcome: ios
              values: [cisco_ios, ios]
            - outcome: nxos
              values: [cisco_nxos, nxos]
        - name: default_outcome
          description: >
            Outcome for devices with a missing or unmatched attribute value.
            When omitted, unmatched devices fail the step.
          data_type: string
          required: false
          example: unmatched
        - name: case_sensitive
          description: When false, route value matching ignores letter case.
          data_type: boolean
          required: false
          default: false

  - id: update-attribute
    name: Update Attribute
    overview: Set or transform device attributes in the workflow.
    description: >
      Set or transform one or more in-workflow device attributes using a fixed
      value or a regular expression with capture groups.
    artifact_type: control_flow
    directory: update_attribute
    enabled: true
    requires: [identity]
    produces: [attributes]
    outcomes:
      - name: success
    metadata:
      configuration_input:
        - name: attributes
          description: >
            Ordered list of attribute updates. Each entry has a mode (fixed or
            regex), destination_path, and mode-specific fields (fixed_value, or
            source_path / pattern / destination_template / regex_flags). Updates
            run in list order for every device.
          data_type: object_list
          required: true
          example:
            - mode: fixed
              destination_path: custom.location
              fixed_value: office-a
            - mode: regex
              source_path: device.name
              destination_path: custom.datacenter
              pattern: ^([^-]+)-
              destination_template: DC-\\1
              regex_flags:
                case_insensitive: false
                multiline: false
                dotall: false

  - id: workflow-log
    name: Logging
    overview: Log a per-device message for workflow debugging.
    description: >
      Log a message to the run result for each device in the workflow context.
      The message can interpolate {path.to.value} placeholders — dot paths
      resolved per device, supporting device.* fields, attribute bags
      (nautobot.role.name, custom.field), capabilities, and status. A path
      that doesn't resolve renders as an empty string.
    artifact_type: control_flow
    directory: workflow_log
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
    metadata:
      configuration_input:
        - name: message
          description: >
            Message logged for every device. Supports {path.to.value}
            placeholders resolved per device.
          data_type: string
          required: true
          example: "Device {device.name} processed from ISE"

  - id: log-attributes
    name: Log Attributes
    overview: Dump workflow context to STDOUT or a file.
    description: >
      Dump the full workflow context — every device field, attribute bag,
      parsed value, and metadata entry — to STDOUT or a file.
    artifact_type: control_flow
    directory: log_attributes
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
    metadata:
      configuration_input:
        - name: output_destination
          description: Write the dump to STDOUT (worker logs) or to a file under DATA_DIRECTORY.
          data_type: string
          required: true
          default: stdout
          example: stdout
        - name: output_format
          description: Serialize the context as JSON or human-readable pretty text.
          data_type: string
          required: true
          default: json
          example: pretty_text
        - name: filename
          description: Relative filename when output_destination is file.
          data_type: string
          required: false
          default: attributes.txt
          example: workflow-attributes.json
        - name: append
          description: Append to an existing file instead of overwriting it.
          data_type: boolean
          required: false
          default: false
        - name: show_parsed_templates
          description: >
            Resolve and print the rendered output of any upstream "Render Jinja
            Template" step (device.parsed entries of kind "rendered_template")
            instead of just its artifact reference.
          data_type: boolean
          required: false
          default: false

  - id: fan-in
    name: Fan In
    overview: Rejoin fan-out branches into one execution path.
    description: >
      Rejoin a fanned-out workflow into a single path. Per-device steps run in
      parallel child workflows up to this node; steps placed after it run once
      over all devices. Place git / store-artifact steps after Fan In for safe,
      single-commit exports.
    artifact_type: control_flow
    directory: fan_in
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
    metadata:
      configuration_input: []

  - id: merge-content
    name: Merge Content
    overview: Merge upstream command output per device.
    description: >
      Combines the command output from one or more upstream run-command steps
      into a single merged artifact per device.
    artifact_type: control_flow
    directory: merge_content
    enabled: true
    requires: [identity]
    produces: [parsed]
    consumes: []
    primary_output: merged_content
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: source_step_node_ids
          description: Canvas node IDs of upstream run-command steps to include (empty = all).
          data_type: string_list
          required: false
        - name: merge_mode
          description: "text_sectioned | text_plain | json_merged"
          data_type: string
          required: true
        - name: section_separator
          description: String placed between command output blocks (text modes).
          data_type: string
          required: false
        - name: include_command_header
          description: Prepend === {command} === before each block in text_sectioned mode.
          data_type: boolean
          required: false

  - id: compare-data
    name: Compare Data
    overview: Compare device output to a reference file.
    description: >
      Compare device configuration or command output against a reference file on the
      local filesystem or in a git repository.
    artifact_type: control_flow
    directory: compare_data
    enabled: true
    requires: [identity]
    produces: [parsed]
    consumes: []
    primary_output: comparison_diff
    outcomes:
      - name: match
      - name: mismatch
      - name: failure
    metadata:
      configuration_input:
        - name: content_source
          description: >
            Which device content to compare (running_config, startup_config,
            command_output, latest_command_output, rendered_template, merged_content).
          data_type: string
          required: true
          example: merged_content
        - name: source_step_node_id
          description: >
            Canvas node id of the upstream step when comparing command output,
            rendered templates, or merged content.
          data_type: string
          required: false
        - name: parsed_output_key
          description: >
            Optional output_key from render-jinja-template when content_source is
            rendered_template.
          data_type: string
          required: false
        - name: reference_location
          description: Where the reference file is stored (filesystem or git).
          data_type: string
          required: false
          default: filesystem
          example: git
        - name: reference_subdirectory
          description: >
            Subdirectory under DATA_DIRECTORY for filesystem references
            (not scoped by workflow/run id).
          data_type: string
          required: false
          default: references
        - name: git_source_id
          description: Git source id from Settings → Sources when reference_location is git.
          data_type: string
          required: false
        - name: repository_subdirectory
          description: Optional path prefix inside the git repository before filename_template.
          data_type: string
          required: false
          example: network/backups
        - name: pull_before_read
          description: Pull latest changes once before reading a git reference file.
          data_type: boolean
          required: false
          default: false
        - name: filename_template
          description: >
            Per-device path to the reference file. Supports device, nautobot, git,
            command, and run placeholders.
          data_type: string
          required: true
          example: "{device.name}.cfg"
        - name: strict_templates
          description: Fail when nautobot.* or command.* placeholders resolve empty.
          data_type: boolean
          required: false
          default: true
        - name: normalize_line_endings
          description: Normalize CRLF/CR to LF before comparing.
          data_type: boolean
          required: false
          default: true
        - name: ignore_trailing_whitespace
          description: Strip trailing whitespace on each line before comparing.
          data_type: boolean
          required: false
          default: false
        - name: comparison_diff_key
          description: >
            Parsed key written per device on mismatch ({node_id}.comparison_diff).
            Contains the unified diff artifact for downstream steps and run inspection.
          data_type: string
          required: false
          example: compare-data-3.comparison_diff

  - id: filter-output
    name: Filter Output
    overview: Strip volatile keys or lines from command output.
    description: >
      Remove volatile keys (JSON) or lines (plain text) from command output
      using regex patterns or dot-path selectors. Use before compare-data or
      store-artifact when output contains timestamps, uptime, or other
      non-deterministic fields.
    artifact_type: control_flow
    directory: filter_output
    enabled: true
    requires: [identity]
    produces: [parsed]
    consumes: []
    primary_output: filtered_output
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: content_source
          description: Which upstream output to filter (command_output or merged_content).
          data_type: string
          required: true
          example: command_output
        - name: source_step_node_id
          description: Canvas node ID of the upstream step to read from.
          data_type: string
          required: true
        - name: filter_rules
          description: >
            Rules applied to the content. Each rule has either pattern (regex matched
            against JSON key names recursively, or against each text line) or path
            (dot-notation like route.ospf to remove a specific nested JSON key).
            For JSON arrays (textfsm output) rules apply to every element in the array.
          data_type: object_list
          required: true
          example:
            - pattern: "^uptime"
            - path: "route.ospf"

  - id: render-jinja-template
    name: Render Jinja Template
    overview: Render a Jinja2 template per device.
    description: Render a Jinja2 template per device and store the result for downstream steps.
    artifact_type: template_rendering
    directory: render_jinja_template
    enabled: true
    requires: [identity]
    produces: [parsed]
    primary_output: rendered_template
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: output_key
          description: >
            Unique key for this template output on each device (used by downstream
            steps and canvas parsed-key validation).
          data_type: string
          required: true
          example: device_config
        - name: template_id
          description: >
            ID of a stored Jinja2 template from the template library, rendered
            once per device at workflow runtime.
          data_type: integer
          required: true

  - id: store-artifact
    name: Store Artifact
    overview: Persist backups, reports, or logs.
    description: >
      Persist generated content such as backups, reports, or logs.
      Fan-out note: filesystem and git sinks write shared destinations; concurrent
      child workflows can race on the same path or git working tree. Prefer
      per-device path templates or disable fan-out when using a shared sink.
    artifact_type: persistent_artifact
    directory: store_artifact
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: destination
          description: Where to persist exported artifacts (filesystem or git).
          data_type: string
          required: false
          default: filesystem
          example: git
        - name: git_source_id
          description: >
            Git source id from Settings → Sources when destination is git
            (same identifier as get-git-devices).
          data_type: string
          required: false
          example: prod-configs
        - name: repository_subdirectory
          description: Optional path prefix inside the git repository before filename_template.
          data_type: string
          required: false
          example: network/backups
        - name: pull_before_write
          description: Pull latest changes once before writing (fails step on pull error).
          data_type: boolean
          required: false
          default: false
        - name: commit_after_write
          description: Create one commit for all files written in this step.
          data_type: boolean
          required: false
          default: false
        - name: push_after_write
          description: Push after commit. Disable when a separate push step handles sync.
          data_type: boolean
          required: false
          default: false
        - name: commit_message_template
          description: Commit message template when commit_after_write is enabled.
          data_type: string
          required: false
          default: "commit {timestamp}"
          example: "Backup run {run.id}"
        - name: output_subdirectory
          description: Subdirectory under the data directory for filesystem exports.
          data_type: string
          required: false
          default: exports
        - name: content_source
          description: >
            Which device content to export from the workflow context
            (running_config, startup_config, command_output, latest_command_output,
            rendered_template, merged_content, or comparison_diff).
          data_type: string
          required: true
          example: running_config
        - name: source_step_node_id
          description: >
            Canvas node id of the upstream step when exporting command output
            (run-command) or rendered templates (render-jinja-template).
          data_type: string
          required: false
        - name: parsed_output_key
          description: >
            Optional output_key from render-jinja-template when content_source is
            rendered_template. When omitted, all rendered templates from the
            selected step are exported.
          data_type: string
          required: false
          example: device_config
        - name: filename_template
          description: >
            Output path template (filename or relative path with subdirectories).
            Use device.* for identity, nautobot.* for Nautobot attributes
            (requires get-nautobot-attributes), git.* for git source metadata
            (requires get-git-devices), run.* for run metadata, command.* for
            command exports, parsed.* for rendered template exports. A leading ./
            is optional.
          data_type: string
          required: true
          example: "./{nautobot.location.name}/{device.name}.cfg"
        - name: strict_templates
          description: Fail export when a namespaced placeholder resolves empty.
          data_type: boolean
          required: false
          default: true
        - name: retention_policy
          description: Retention policy that controls artifact lifecycle (reserved for future use).
          data_type: string
          required: false
          default: standard-90-days
          example: standard-90-days

  - id: git-clone
    name: Git Clone
    overview: Clone a git source to the local working tree.
    description: >
      Clone or re-clone a configured git source into the local working tree.
      Fan-out note: mutates a shared local working tree for the git source; not
      safe to run concurrently across fan-out children for the same source.
    artifact_type: persistent_artifact
    directory: git_clone
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: git_source_id
          description: ID of a Git source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-configs

  - id: git-pull
    name: Git Pull
    overview: Pull latest changes for a git source.
    description: >
      Pull the latest changes for a configured git source.
      Fan-out note: mutates a shared local working tree for the git source; not
      safe to run concurrently across fan-out children for the same source.
    artifact_type: persistent_artifact
    directory: git_pull
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: git_source_id
          description: ID of a Git source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-configs

  - id: git-push
    name: Git Push
    overview: Commit and push changes to git remote.
    description: >
      Commit exported changes and push them to the configured git source remote.
      Fan-out note: commits/pushes against a shared remote working tree; concurrent
      fan-out children for the same source can conflict. Prefer a single push after
      fan-in, or unique branches/paths per child.
    artifact_type: persistent_artifact
    directory: git_push
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: git_source_id
          description: ID of a Git source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-configs
        - name: commit_before_push
          description: Stage and commit workflow exports before pushing to the remote.
          data_type: boolean
          required: false
          default: true
        - name: commit_message_template
          description: Commit message template when commit_before_push is enabled.
          data_type: string
          required: false
          default: "commit {timestamp}"
          example: "Backup run {run.id}"
