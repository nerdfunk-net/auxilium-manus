# Plugin registry for Auxilium Manus.
#
# The backend should read this file once during application startup and expose
# the resulting static registry through an API endpoint for the frontend.
schema_version: 1

plugins:
  - id: get-nautobot-devices
    name: Get from Nautobot
    description: Select one or more target devices from the inventory.
    artifact_type: inventory_selector
    directory: get_nautobot_devices
    enabled: true
    metadata:
      configuration_input:
        - name: inventory_source
          description: Inventory provider used to resolve target devices.
          data_type: dict
          required: true
          example: {'url': 'localhost:8000', 'token': 'abc123'}
        - name: device_filter
          description: Filter expression that selects devices for this workflow.
          data_type: object
          required: true
          example:
            site: dc1
            role: leaf
      outcomes:
        - name: selected_devices
          description: Devices selected for downstream workflow steps.
          data_type: device_list

  - id: get-nautobot-attributes
    name: Get Nautobot Attributes
    description: Retrieve attributes from Nautobot for selected devices.
    artifact_type: inventory_selector
    directory: nautobot_attributes
    enabled: true
    metadata:
      mandatory_input:
        - name: selected_devices
          description: Devices selected for further attribute retrieval.
          data_type: device_list
          required: true
      configuration_input:
        - name: list_of_attributes
          description: List of Nautobot attributes to retrieve for each device.
          data_type: string_list
          required: true
          example:
            - location
            - role      
      outcomes:
        - name: attributes_by_device
          description: Retrieved Nautobot attributes organized by device.
          data_type: device_attribute_map
        - name: failure
          description: Attribute retrieval failed.
          data_type: device_list

  - id: get-device-configs
    name: Get Configs
    description: Get device configuration in the specified format.
    artifact_type: configuration_retrieval
    directory: get_device_configs
    enabled: true
    metadata:
      mandatory_input:
        - name: selected_devices
          description: Devices selected for configuration retrieval.
          data_type: device_list
          required: true
      configuration_input:
        - name: credential_reference
          description: Reference to credentials stored in the backend.
          data_type: credential_ref
          required: true
        - name: config_format
          description: Format of the configuration to retrieve.
          data_type: string
          required: false
          default: running
          example: running
      outcomes:
        - name: configuration
          description: Running and startup configuration of the selected devices.
          data_type: text_map
        - name: failure
          description: Configuration retrieval failed.
          data_type: dict
          example: {'device1': 'timeout', 'device2': 'authentication failure'}

  - id: run-command
    name: Run Command
    description: Execute one or more CLI commands on connected devices.
    artifact_type: command_execution
    directory: run_command
    enabled: true
    metadata:
      mandatory_input:
        - name: selected_devices
          description: Devices selected for command execution.
          data_type: device_list
          required: true
      configuration_input:
        - name: credential_reference
          description: Reference to credentials stored in the backend.
          data_type: credential_ref
          required: true
        - name: commands
          description: CLI commands to execute in order.
          data_type: string_list
          required: true
          example:
            - show version
            - show running-config
      outcomes:
        - name: command_results
          description: Structured command results split by device and command.
          data_type: command_result_list
        - name: raw_output
          description: Raw CLI output grouped by device.
          data_type: text_map
        - name: failure
          description: Command execution failed.
          data_type: dict
          example: {'device1': 'timeout', 'device2': 'authentication failure'}

  - id: cisco-device-os
    name: Name of Cisco Device OS
    description: Identify the operating system running on each device.
    artifact_type: control_flow
    directory: condition
    enabled: true
    metadata:
      mandatory_input:
        - name: devices
          description: List of devices to evaluate.
          data_type: device_list
          required: true
      outcomes:
        - name: ios
          description: If the device is running Cisco IOS.
          data_type: device_list
        - name: ios_xe
          description: If the device is running Cisco IOS XE.
          data_type: device_list
        - name: ios_xr
          description: If the device is running Cisco IOS XR.
          data_type: device_list
        - name: nxos
          description: If the device is running Cisco NX-OS.
          data_type: device_list

  - id: store-artifact
    name: Store Artifact
    description: Persist generated content such as backups, reports, or logs.
    artifact_type: persistent_artifact
    directory: store_artifact
    enabled: true
    metadata:
      mandatory_input:
        - name: content_reference
          description: Reference to content generated by an earlier step.
          data_type: output_ref
          required: true
      configuration_input:
        - name: retention_policy
          description: Retention policy that controls artifact lifecycle.
          data_type: string
          required: true
          example: standard-90-days
      outcomes:
        - name: success
          description: Artifact was stored successfully.
        - name: failure
          description: Artifact storage failed.
