# Plugin registry for Auxilium Manus.
#
# Capability fields (requires, produces, consumes, outcomes) drive canvas validation
# and runtime guards. metadata.configuration_input drives step config forms.
schema_version: 1

plugins:
  - id: get-nautobot-devices
    name: Get from Nautobot
    description: Select one or more target devices from the inventory.
    artifact_type: inventory_selector
    directory: get_nautobot_devices
    enabled: true
    requires: []
    produces: [identity]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: nautobot_source_id
          description: ID of a Nautobot source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-lab
        - name: device_filter
          description: Filter expression that selects devices for this workflow.
          data_type: object
          required: true
          example:
            location: dc1
            role: network

  - id: get-git-devices
    name: Get from Git
    description: Select one or more target devices from the inventory.
    artifact_type: inventory_selector
    directory: get_git_devices
    enabled: true
    requires: []
    produces: [identity]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: git_source_id
          description: ID of a Git source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-lab
        - name: filename_pattern
          description: Pattern to identify relevant files in the Git repository.
          data_type: string
          required: true
          example: 'configs/*.yaml'
        - name: device_mapping
          description: Mapping that extracts device identifiers from file contents.
          data_type: object
          required: false
          example:
            device_id_field: hostname

  - id: get-nautobot-attributes
    name: Get Nautobot Attributes
    description: Retrieve attributes from Nautobot for selected devices.
    artifact_type: inventory_selector
    directory: nautobot_attributes
    enabled: true
    requires: [identity]
    produces: [attributes]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: nautobot_source_id
          description: ID of a Nautobot source configured under Settings → Sources.
          data_type: string
          required: true
          example: prod-lab
        - name: list_of_attributes
          description: List of Nautobot attributes to retrieve for each device.
          data_type: string_list
          required: true
          example:
            - location
            - role

  - id: get-device-configs
    name: Get Configs
    description: Get device configuration in the specified format.
    artifact_type: configuration_retrieval
    directory: get_device_configs
    enabled: true
    requires: [identity]
    produces: [running_config, startup_config]
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: credential_reference
          description: Reference to credentials stored in the backend.
          data_type: credential_ref
          required: true
        - name: config_format
          description: Format of the configuration to retrieve.
          data_type: string
          required: false
          default: both
          example: both

  - id: run-command
    name: Run Command
    description: Execute one or more CLI commands on connected devices.
    artifact_type: command_execution
    directory: run_command
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: credential_reference
          description: Reference to credentials stored in the backend.
          data_type: credential_ref
          required: true
        - name: commands
          description: CLI commands to execute in order.
          data_type: string_list
          required: true
          example:
            - show version
            - show running-config
        - name: use_textfsm
          description: Parse command output with TextFSM templates when available.
          data_type: boolean
          required: false
          default: false
        - name: network_driver_override
          description: Override the Netmiko device type for all devices in this step.
          data_type: string
          required: false
          example: cisco_ios

  - id: cisco-device-os
    name: Name of Cisco Device OS
    description: Identify the operating system running on each device.
    artifact_type: control_flow
    directory: condition
    enabled: true
    requires: [identity]
    produces: [identity]
    outcomes:
      - name: ios
      - name: ios_xe
      - name: ios_xr
      - name: nxos

  - id: store-artifact
    name: Store Artifact
    description: Persist generated content such as backups, reports, or logs.
    artifact_type: persistent_artifact
    directory: store_artifact
    enabled: true
    requires: [identity]
    produces: []
    outcomes:
      - name: success
      - name: failure
    metadata:
      configuration_input:
        - name: destination
          description: Where to persist exported artifacts.
          data_type: string
          required: false
          default: filesystem
          example: filesystem
        - name: output_subdirectory
          description: Subdirectory under the data directory for filesystem exports.
          data_type: string
          required: false
          default: exports
        - name: content_source
          description: Which device content to export from the workflow context.
          data_type: string
          required: true
          example: running_config
        - name: source_step_node_id
          description: Canvas node id of the run-command step when exporting command output.
          data_type: string
          required: false
        - name: filename_template
          description: >
            Output path template (filename or relative path with subdirectories).
            Use device.* for identity, nautobot.* for Nautobot attributes
            (requires get-nautobot-attributes), git.* for git source metadata
            (requires get-git-devices), run.* for run metadata, command.* for
            command exports. A leading ./ is optional.
          data_type: string
          required: true
          example: "./{nautobot.location.name}/{device.name}.cfg"
        - name: strict_templates
          description: Fail export when a namespaced placeholder resolves empty.
          data_type: boolean
          required: false
          default: true
        - name: retention_policy
          description: Retention policy that controls artifact lifecycle (reserved for future use).
          data_type: string
          required: false
          default: standard-90-days
          example: standard-90-days
